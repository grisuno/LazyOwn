repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: '^(graphify-out/|sessions/|parquets/|external/|modules_ext/|.*\.(svg|min\.js|min\.css))$'
      - id: trailing-whitespace
        exclude: '^(graphify-out/|sessions/|parquets/|external/|modules_ext/|.*\.(svg|min\.js|min\.css))$'
      - id: check-yaml
        exclude: '^(graphify-out/|sessions/|external/|modules_ext/)'
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
        exclude: '^(graphify-out/|sessions/|parquets/|external/|modules_ext/)'
      - id: detect-private-key
        exclude: '^(graphify-out/|sessions/|external/|tests/|modules_ext/)'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        exclude: '^(graphify-out/|sessions/|parquets/|external/|modules_ext/)'

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^(graphify-out/|sessions/|parquets/|external/|modules_ext/|payload\.json|.*\.lock|.*\.min\.(js|css))$'
