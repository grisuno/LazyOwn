name: opencode_adapter
description: "LazyOwn OpenCode Adapter — OpenAI-compatible function calling bridge\
  \ for the LazyOwn pentesting framework.\nExposes all 95+ LazyOwn MCP tools as REST\
  \ endpoints that OpenCode, Kimi, and any OpenAI-compatible client can call natively.\n\
  Architecture:\n  OpenCode / Kimi / OpenAI Client\n          |\n          | HTTP\
  \ JSON (OpenAI function format)\n          v\n    LazyOwn OpenCode Adapter (FastAPI)\n\
  \          |\n          | stdio MCP protocol\n          v\n    LazyOwn MCP Server\
  \ (lazyown_mcp.py)\n          |\n          | Python imports + subprocess\n     \
  \     v\n    LazyOwn Framework\n\nEndpoints provided by the adapter:\n  GET  /health\
  \       — Health check\n  GET  /tools        — List all LazyOwn tools in OpenAI\
  \ function format\n  POST /call         — Execute a tool by name with arguments\n\
  \  GET  /config       — Show adapter configuration\n\nUsage inside LazyOwn shell:\n\
  \  opencode_adapter                    # start adapter on default 127.0.0.1:9872\n\
  \  opencode_adapter --host 0.0.0.0     # bind on all interfaces\n  opencode_adapter\
  \ --port 8080        # custom port\n\nThe adapter auto-detects the LazyOwn directory\
  \ by walking up from its own installation path, so no manual path configuration\
  \ is required.\nRequirements:\n  Python 3.10+, venv support, pip.\n\nSource: https://github.com/grisuno/LazyOwnOpenCodeAdapter\n"
author: LazyOwn RedTeam
version: '1.0'
enabled: true
params:
- name: lhost
  type: string
  required: false
  description: Host to bind the adapter server (default 127.0.0.1)
- name: lport
  type: string
  required: false
  description: Port to bind the adapter server (default 9872)
tool:
  name: opencode_adapter
  repo_url: https://github.com/grisuno/LazyOwnOpenCodeAdapter.git
  install_path: external/.exploit/LazyOwnOpenCodeAdapter
  install_command: rm -rf venv && python3 -m venv venv && ./venv/bin/python3 -m pip
    install --upgrade pip && ./venv/bin/python3 -m pip install -r requirements.txt
  execute_command: ./venv/bin/python3 adapter.py --host "{lhost}" --port "{lport}"
    --log-level "info"
category: 04. Post-Exploitation
