name: orchestrator-C-002

on:
  pull_request:
    branches: [dev]
  push:
    branches: [feature/c-002]

permissions:
  contents: read

jobs:
  test:
    name: orchestrator-C-002
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${ matrix.python-version }
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run ruff
        run: ruff check skills/claude_md_orchestrator/runs/current/tests/test_c-002.py skills/claude_md_orchestrator/runs/current/src/c-002.py
      - name: Run mypy
        run: mypy --ignore-missing-imports skills/claude_md_orchestrator/runs/current/tests/test_c-002.py skills/claude_md_orchestrator/runs/current/src/c-002.py
      - name: Run bandit
        run: bandit -q skills/claude_md_orchestrator/runs/current/src/c-002.py
      - name: Run pytest
        run: pytest -q skills/claude_md_orchestrator/runs/current/tests/test_c-002.py
