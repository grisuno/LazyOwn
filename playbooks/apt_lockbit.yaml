apt_name: LockBit
aliases:
- Bitwise Spider
- ABCD
source_urls:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-075a
- https://www.mandiant.com/resources/blog/lockbit-ransomware-operations
description: 'LockBit is a ransomware-as-a-service (RaaS) operation known for its
  fast

  encryption speed, self-spreading capabilities, and double/triple extortion.

  The group recruits affiliates and uses a variety of initial access vectors.

  '
platforms:
- windows
- linux
phases:
- name: initial_access
  technique_id: T1190
  technique_name: Exploit Public-Facing Application
  description: Exploitation of public-facing applications (VPN, firewall, RDP) for
    initial access.
  atomic_tests:
  - atomic_id: T1190
    name: CVE-2023-23397 Outlook Exploit
    manual: true
  detection_hints:
  - Failed login spikes on VPN/RDP gateways
  - Exploit payloads in web server logs
- name: execution
  technique_id: T1059.003
  technique_name: Windows Command Shell
  description: Use of cmd.exe and batch scripts for execution and staging.
  atomic_tests:
  - atomic_id: T1059.003
    name: Windows Command Shell
    manual: false
  detection_hints:
  - Unusual cmd.exe parent processes
  - Batch files executing from temp directories
- name: persistence
  technique_id: T1547.001
  technique_name: Registry Run Keys
  description: Registry Run Keys for persistence of loaders and beacons.
  atomic_tests:
  - atomic_id: T1547.001
    name: Reg Key Run
    manual: false
  detection_hints:
  - Monitor HKCU Run keys pointing to unusual paths
  - Correlate with scheduled task creation
- name: defense_evasion
  technique_id: T1218.011
  technique_name: Rundll32
  description: Execution of payloads via rundll32 to evade application whitelisting.
  atomic_tests:
  - atomic_id: T1218.011
    name: Rundll32 Execute JavaScript
    manual: false
  detection_hints:
  - rundll32.exe with unusual command-lines
  - Network connections from rundll32
- name: credential_access
  technique_id: T1003.001
  technique_name: LSASS Memory
  description: Credential dumping to enable lateral movement and domain compromise.
  atomic_tests:
  - atomic_id: T1003.001
    name: Dump LSASS.exe Memory
    manual: true
  detection_hints:
  - Enable Credential Guard
  - Alert on LSASS access by non-system processes
- name: lateral_movement
  technique_id: T1021.001
  technique_name: Remote Desktop Protocol
  description: Lateral movement via RDP using stolen credentials.
  atomic_tests:
  - atomic_id: T1021.001
    name: RDP Hijacking
    manual: true
  detection_hints:
  - RDP connections from unexpected source IPs
  - Multiple concurrent RDP sessions from same account
- name: impact
  technique_id: T1486
  technique_name: Data Encrypted for Impact
  description: Rapid ransomware encryption using LockBit's custom encryptor.
  atomic_tests:
  - atomic_id: T1486
    name: Encrypt Files Using ransomware
    manual: true
  detection_hints:
  - Mass file renames to .lockbit or .abcd extensions
  - High disk I/O from a single process
