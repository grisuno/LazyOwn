name: pyrit
description: >
  Python Risk Identification Tool for generative AI (PyRIT) by Microsoft/Azure.
  Empowers red teamers to proactively identify risks in generative AI systems.
  Launches the interactive PyRIT shell for AI red teaming sessions.
  Use pyrit_scan for automated scanning and pyrit_backend to start the memory backend.
author: "Microsoft Azure"
version: "1.0"
enabled: true
params:
  - name: api_key
    type: string
    required: false
    description: OpenAI/Azure API key (can also be set via OPENAI_API_KEY env var)
tool:
  name: pyrit
  repo_url: https://github.com/Azure/PyRIT.git
  install_path: external/.exploit/PyRIT
  install_command: pip install pyrit
  execute_command: pyrit_shell
