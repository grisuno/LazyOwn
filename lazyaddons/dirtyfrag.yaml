name: dirtyfrag
description: >
  Dirty Frag is a case that extends the bug class to which Dirty Pipe and Copy Fail belong. Because it is a deterministic logic bug that does not depend on a timing window, no race condition is required, the kernel does not panic when the exploit fails, and the success rate is very high.
author: "V4bel"
version: "1.0"
enabled: true
params:
  - name: lhost
    type: string
    required: true
    description: lhost target.
tool:
  name: dirtyfrag
  repo_url: https://github.com/V4bel/dirtyfrag.git
  install_path: external/.exploit/dirtyfrag
  install_command: gcc -O0 -Wall -o exp exp.c -lutil
  execute_command: chmod +x exp && ./exp
  