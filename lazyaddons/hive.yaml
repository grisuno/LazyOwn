name: hive
description: "Invokes Claude Code CLI with the LazyOwn MCP server and executes an\
  \ autonomous or hive-mind operation based on the given prompt.\nClaude Code receives\
  \ the prompt and uses lazyown MCP tools to fulfil it:\n  - lazyown_hive_spawn  \
  \  : spawn parallel drones for complex investigations\n  - lazyown_autonomous_start\
  \ : start the fully autonomous execution daemon\n  - lazyown_run_command   : execute\
  \ any LazyOwn shell command\n  - lazyown_rag_query     : query past session intelligence\n\
  \  - lazyown_facts_show    : retrieve structured target facts\n  - lazyown_threat_model\
  \  : generate a MITRE ATT&CK threat model\n  - lazyown_recommend_next: get the next\
  \ recommended action\n\nUsage:\n  hive <prompt>\n  hive --interactive <prompt>\n\
  \  hive --effort max <prompt>\n\nExamples:\n  hive spawn 3 drones to enumerate SMB\
  \ on 10.10.11.78\n  hive start autonomous mode targeting 10.10.11.78\n  hive what\
  \ credentials and hosts have been captured so far\n  hive analyze the latest session\
  \ and recommend next steps\n  hive --interactive enumerate Active Directory domain\
  \ controller at 10.10.11.78\n  hive --effort max perform a full red team operation\
  \ on 10.10.11.0/24\n\nFlags (prepend before the prompt):\n  --interactive / -i \
  \    Open Claude in interactive REPL instead of print mode\n  --effort LEVEL / -e\
  \    Set effort level: low | medium | high (default) | max\n"
author: LazyOwn RedTeam
version: '1.0'
enabled: true
tool:
  name: hive
  repo_url: https://github.com/grisuno/LazyOwn.git
  install_path: .
  execute_command: python3 modules/hive_invoke.py
category: 10. Command & Control
