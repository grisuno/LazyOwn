contract_id: C-002
goal: ci-strict-mode
trigger: 'The CI workflow must fail when the test suite fails or when a lint rule
  breaks. The current workflow swallows every failure through the `|| true` shim and
  the `continue-on-error: true` flag. The orchestrator will replace the workflow with
  a strict version that runs ruff, mypy, bandit, and pytest without any swallow. The
  strict workflow runs on every push to main and on every pull request targeting main.
  The strict workflow installs the dev dependencies from requirements-dev.txt. The
  strict workflow reports the failing step in the GitHub Actions log.'
inputs: []
happy_path:
- the operator runs the contract through the orchestrator entry point
- the spec agent writes the spec to the run directory
- the test agent reads the spec and produces failing tests
- the implementation agent reads the spec and the tests
- the implementation makes every test green
- the reviewer approves the contract
- the cicd agent cuts the branch and the pipeline
sad_paths:
- condition: missing input
  expected: the agent reports a missing input and exits without writing the spec
- condition: invalid input type
  expected: the agent coerces the value or raises a typed error
- condition: external dependency offline
  expected: the agent degrades to the template engine
- condition: caller asks to skip validation
  expected: the agent refuses and logs a blocker
- condition: concurrent writer
  expected: the agent writes to a tmp path and renames atomically
- condition: disk full
  expected: the agent raises IOError and the orchestrator stops the cycle
data_flow: the contract lands in the parser, the spec agent writes the spec, the test
  agent writes the tests, the implementation agent writes the source, the reviewer
  runs the checks
observability: the operator reads the review report and the cycle log; the cycle halts
  on the first blocker
out_of_scope:
- changes outside the contract scope
- deploys without the human gate token
author: claude_md_orchestrator
created_at: '2026-06-29T08:29:15.026800+00:00'
